<div class="workspace-split">
  <div class="pane request-pane" [style.flex-basis.%]="splitPercent()">
    <app-request-builder (saveRequested)="saveRequested.emit()" />
  </div>

  <div class="resize-handle" (mousedown)="onResizeMouseDown($event)"></div>

  <div class="pane response-pane" [style.flex-basis.%]="100 - splitPercent()">
    <app-response-viewer />
  </div>
</div>
