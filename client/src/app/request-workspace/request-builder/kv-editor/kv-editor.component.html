<div class="kv-editor">
  <div class="kv-header">
    <span class="col-check"></span>
    <span class="col-key">Key</span>
    <span class="col-val">Value</span>
    <span class="col-del"></span>
  </div>

  <div class="kv-rows">
    @for (row of rows(); track trackById($index, row)) {
      <div class="kv-row" [class.disabled]="!row.enabled">
        <input
          type="checkbox"
          class="col-check form-check-input"
          tabindex="-1"
          [checked]="row.enabled"
          (change)="toggleRow(row.id)"
        />
        <div class="col-key kv-key-wrap">
          <input
            type="text"
            class="kv-input"
            autocomplete="off"
            [class.has-var]="row.key.includes('{{')"
            [placeholder]="placeholder()"
            [value]="row.key"
            (input)="onKeyInput(row.id, $any($event.target).value)"
            (focus)="onKeyFocus(row.id, row.key)"
            (blur)="onKeyBlur()"
            (keydown)="onKeyDown(row.id, $event)"
          />
          @if (showSuggestions(row.id)) {
            <div class="kv-suggest">
              @for (s of filteredSuggestions(); track s; let i = $index) {
                <button
                  type="button"
                  class="kv-suggest-item"
                  [class.active]="i === highlightIndex()"
                  (mousedown)="$event.preventDefault()"
                  (click)="selectSuggestion(row.id, s)"
                >
                  {{ s }}
                </button>
              }
            </div>
          }
        </div>
        <input
          type="text"
          class="col-val kv-input"
          [class.has-var]="row.value.includes('{{')"
          [placeholder]="valuePlaceholder()"
          [value]="row.value"
          (input)="updateValue(row.id, $any($event.target).value)"
        />
        <button class="col-del btn-del" tabindex="-1" (click)="removeRow(row.id)" title="Remove">
          <i class="bi bi-x"></i>
        </button>
      </div>
    }
  </div>
</div>
