<main class="app-main">
  <!-- Tab strip -->
  <div class="tabs-bar" cdkDropList cdkDropListOrientation="horizontal" (cdkDropListDropped)="onTabDrop($event)">
    @for (tab of tabService.tabs(); track tab.id) {
      <div class="tab-item" role="tab" tabindex="0" cdkDrag
           [class.active]="tab.id === tabService.activeTabId()" [class.dirty]="tab.isDirty"
           (click)="tabService.activateTab(tab.id)"
           (keydown.enter)="tabService.activateTab(tab.id)"
           (keydown.space)="$event.preventDefault(); tabService.activateTab(tab.id)"
           (contextmenu)="openTabMenu($event, tab)">
        <span class="tab-method" [ngClass]="methodClass(tab.request.method)">
          {{ tab.request.method }}
        </span>
        <span class="tab-label">{{ tab.label }}</span>
        @if (tab.isDirty) { <span class="tab-dirty-dot"></span> }
        <button class="tab-close" (click)="closeTab($event, tab.id)">
          <i class="bi bi-x"></i>
        </button>
      </div>
    }
    <button class="tab-new" title="New tab (Ctrl+N)" (click)="tabService.openTab()">
      <i class="bi bi-plus"></i>
    </button>
  </div>

  <!-- Workspace -->
  <div class="workspace">
    <app-request-workspace />
  </div>

  <!-- Status bar -->
  <div class="status-bar d-flex align-items-center gap-3 px-3 py-1">
    <span class="d-flex align-items-center gap-1">
      <span class="status-dot" [ngClass]="'status-' + centralStatus()"></span> {{ centralLabel() }}
    </span>
    <span class="ms-auto d-flex align-items-center gap-3">
      <span class="d-flex align-items-center gap-1">
        <kbd>Ctrl+Enter</kbd> Send
      </span>
      <span class="d-flex align-items-center gap-1">
        <kbd>Ctrl+S</kbd> Save
      </span>
      <span class="d-flex align-items-center gap-1">
        <kbd>Ctrl+N</kbd> New
      </span>
    </span>
  </div>
</main>
