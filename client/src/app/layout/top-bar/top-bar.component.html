<div class="top-bar">
  <span class="wordmark">DISPATCH</span>

  <div class="top-bar-spacer"></div>

  <div class="top-bar-actions">
    <!-- Environment selector -->
    <div class="env-selector-group">
      <select
        class="env-select"
        [ngModel]="selectedEnvId()"
        (ngModelChange)="onEnvChange($event)"
        title="Active environment"
      >
        <option value="">No Environment</option>
        @for (env of environments(); track env.id) {
          <option [value]="env.id">{{ env.name }}</option>
        }
      </select>
      <button class="btn-icon btn-icon-env" title="Manage Environments (Ctrl+E)" (click)="openEnvEditor()">
        <i class="bi bi-pencil"></i>
      </button>
    </div>

    <div class="btn-icon-divider"></div>

    <!-- Single settings button -->
    <button class="btn-icon" title="Settings" (click)="settingsModal.open('general')">
      <i class="bi bi-gear"></i>
    </button>
  </div>
</div>
