<div class="top-bar">
  <span class="wordmark">DISPATCH</span>

  <div class="top-bar-spacer"></div>

  <div class="env-selector">
    <i class="bi bi-layers env-icon"></i>
    <select
      class="env-select"
      [ngModel]="selectedId()"
      (ngModelChange)="onEnvChange($event)"
    >
      <option value="">No Environment</option>
      @for (env of environments(); track env.id) {
        <option [value]="env.id">{{ env.name }}</option>
      }
    </select>
    <button class="btn-icon" title="Manage environments" (click)="openEditor()">
      <i class="bi bi-pencil"></i>
    </button>
  </div>

  <div class="top-bar-actions">
    <button class="btn-icon" title="Settings" (click)="settingsModal.open()">
      <i class="bi bi-sliders2"></i>
    </button>
  </div>
</div>
