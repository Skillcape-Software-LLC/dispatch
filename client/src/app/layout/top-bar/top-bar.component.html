<div class="top-bar">
  <span class="wordmark">DISPATCH</span>

  <div class="top-bar-spacer"></div>

  <div class="env-selector">
    <i class="bi bi-layers env-icon"></i>
    <select
      class="env-select"
      [value]="selectedId()"
      (change)="onEnvChange($any($event.target).value)"
    >
      <option value="">No Environment</option>
      @for (env of environments(); track env.id) {
        <option [value]="env.id">{{ env.name }}</option>
      }
    </select>
    <button class="btn-icon" title="Manage environments" (click)="openEditor()">
      <i class="bi bi-pencil"></i>
    </button>
  </div>

  <div class="top-bar-actions">
    <button class="btn-icon" (click)="themeService.toggle()"
            [title]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (themeService.theme() === 'dark') {
        <i class="bi bi-sun"></i>
      } @else {
        <i class="bi bi-moon-stars-fill"></i>
      }
    </button>
    <button class="btn-icon" title="Settings" (click)="settingsModal.open()">
      <i class="bi bi-sliders2"></i>
    </button>
  </div>
</div>
