services:
  dispatch:
    image: ghcr.io/skillcape-software-llc/dispatch:latest
    ports:
      - "3000:3000"
    volumes:
      - dispatch-data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATA_DIR: /data
      DISPATCH_IN_DOCKER: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dispatch-data:
