services:
  dispatch:
    image: ghcr.io/skillcape-software-llc/dispatch:v1.1.2
    ports:
      - "3000:3000"
    volumes:
      - dispatch-data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATA_DIR: /data

volumes:
  dispatch-data:
